<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Myntra Ads Analytics</title>

<link rel="stylesheet" href="./css/reset.css">
<link rel="stylesheet" href="./css/variables.css">
<link rel="stylesheet" href="./css/layout.css">
<link rel="stylesheet" href="./css/header.css">
<link rel="stylesheet" href="./css/filters.css">
<link rel="stylesheet" href="./css/tabs.css">
<link rel="stylesheet" href="./css/cards.css">
<link rel="stylesheet" href="./css/loaders.css">
</head>

<body>

<div id="app"></div>

<!-- HARD DEBUG -->
<div id="hardDebug" style="
position:fixed;
bottom:10px;
left:10px;
right:10px;
background:#111;
color:#0f0;
font-size:12px;
padding:10px;
z-index:99999;
border-radius:10px;
max-height:220px;
overflow:auto;
font-family:monospace;
">
DEBUG PANEL STARTED...
</div>

<script>
window.onerror=function(msg,file,line,col,error){
document.getElementById("hardDebug").innerHTML += "<br>ERROR: "+msg+" @ "+line;
};

document.getElementById("hardDebug").innerHTML += "<br>HTML Loaded";
</script>

<script type="module">
document.getElementById("hardDebug").innerHTML += "<br>Trying app.js load...";

import("./js/core/app.js")
.then(()=>{
document.getElementById("hardDebug").innerHTML += "<br>app.js loaded SUCCESS";
})
.catch(err=>{
document.getElementById("hardDebug").innerHTML += "<br>MODULE ERROR: "+err;
});
</script>

</body>
</html>
