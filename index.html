<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Myntra Ads Analytics</title>

  <link rel="stylesheet" href="./css/style.css">

  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>
    eruda.init();
  </script>
</head>
<body>

  <header class="topbar">
    <div class="brand">Myntra Ads Analytics V2.5</div>
  </header>

  <section id="filters"></section>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
    <button class="tab-btn" data-tab="campaign">Campaign</button>
    <button class="tab-btn" data-tab="adgroup">Adgroup</button>
    <button class="tab-btn" data-tab="style">Style</button>
    <button class="tab-btn" data-tab="ppr">PPR</button>
    <button class="tab-btn" data-tab="analysis">Analysis</button>
    <button class="tab-btn" data-tab="sales">Sales</button>
    <button class="tab-btn" data-tab="sjit">SJIT</button>
    <button class="tab-btn" data-tab="export">Export</button>
  </nav>

  <main class="page-wrap">
    <section id="dashboard"></section>
    <section id="campaign" style="display:none;"></section>
    <section id="adgroup" style="display:none;"></section>
    <section id="style" style="display:none;"></section>
    <section id="ppr" style="display:none;"></section>
    <section id="analysis" style="display:none;"></section>
    <section id="sales" style="display:none;"></section>
    <section id="sjit" style="display:none;"></section>
    <section id="export" style="display:none;"></section>
  </main>

  <script type="module" src="./js/app.js"></script>

</body>
</html>
