<!-- FILE: index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Myntra Ads Analytics</title>

<link rel="stylesheet" href="./css/reset.css" />
<link rel="stylesheet" href="./css/variables.css" />
<link rel="stylesheet" href="./css/layout.css" />
<link rel="stylesheet" href="./css/header.css" />
<link rel="stylesheet" href="./css/filters.css" />
<link rel="stylesheet" href="./css/tabs.css" />
<link rel="stylesheet" href="./css/cards.css" />
<link rel="stylesheet" href="./css/loaders.css" />
</head>

<body>

<div id="app">

<header class="app-header">
<div class="brand-wrap">
<div class="brand-logo">M</div>
<div>
<h1 class="brand-title">Myntra Ads Analytics</h1>
<p class="brand-subtitle">Performance Control Center</p>
</div>
</div>

<div class="header-actions">
<button class="ghost-btn" id="refreshBtn">Refresh</button>
<button class="primary-btn" id="consoleToggleBtn">Console</button>
</div>
</header>

<section class="filter-bar">
<div class="filter-item">
<label>Year</label>
<select id="yearFilter"></select>
</div>

<div class="filter-item">
<label>Month</label>
<select id="monthFilter"></select>
</div>

<div class="filter-item">
<label>Start Date</label>
<input type="date" id="startDate">
</div>

<div class="filter-item">
<label>End Date</label>
<input type="date" id="endDate">
</div>

<div class="filter-actions">
<button class="primary-btn" id="applyBtn">Apply</button>
</div>
</section>

<nav class="tabs-wrap">
<button class="tab active">Dashboard</button>
<button class="tab">Campaign</button>
<button class="tab">Adgroup</button>
<button class="tab">Style</button>
<button class="tab">Analysis</button>
<button class="tab">Export Center</button>
</nav>

<main class="page-wrap"></main>

<aside class="dev-console hidden" id="devConsole">
<div class="console-head">
<span>Developer Console</span>
<button id="closeConsole">✕</button>
</div>
<div class="console-body"></div>
</aside>

</div>

<script type="module" src="./js/core/app.js?v=2"></script>

</body>
</html>
