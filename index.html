<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Myntra Ads Dashboard MVP</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,Helvetica,sans-serif;
background:#f5f7fb;
color:#111;
padding:18px;
}
.wrap{max-width:1400px;margin:auto}
.top{
display:flex;
gap:12px;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
margin-bottom:18px;
}
h1{font-size:26px}
.filters{
display:flex;
gap:10px;
flex-wrap:wrap;
}
select,button{
height:42px;
padding:0 14px;
border:1px solid #ddd;
border-radius:10px;
background:#fff;
font-size:14px;
}
button{
background:#ff3f6c;
color:#fff;
border:none;
font-weight:700;
cursor:pointer;
}
.grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:14px;
margin-bottom:18px;
}
.card{
background:#fff;
padding:16px;
border-radius:16px;
box-shadow:0 2px 10px rgba(0,0,0,.05);
}
.label{
font-size:12px;
color:#666;
margin-bottom:8px;
text-transform:uppercase;
font-weight:700;
}
.value{
font-size:26px;
font-weight:800;
}
.panel{
background:#fff;
padding:18px;
border-radius:16px;
box-shadow:0 2px 10px rgba(0,0,0,.05);
margin-bottom:18px;
}
.panel h3{
margin-bottom:14px;
font-size:18px;
}
table{
width:100%;
border-collapse:collapse;
min-width:900px;
}
th,td{
padding:10px;
border-bottom:1px solid #eee;
font-size:14px;
text-align:left;
}
th{
background:#fafafa;
position:sticky;
top:0;
}
.scroll{overflow:auto}
.small{font-size:13px;color:#666}
.bar{
height:14px;
background:#eef2f7;
border-radius:999px;
overflow:hidden;
margin-bottom:10px;
}
.fill{
height:100%;
background:#ff3f6c;
}
@media(max-width:1100px){
.grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:700px){
.grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:520px){
.grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="wrap">

<div class="top">
<div>
<h1>Myntra Ads Dashboard</h1>
<div class="small">Single File Working MVP</div>
</div>

<div class="filters">
<select id="month"></select>
<button onclick="loadData()">Apply</button>
</div>
</div>

<div class="grid" id="kpis"></div>

<div class="panel">
<h3>Daily Spend vs Revenue</h3>
<div id="trend"></div>
</div>

<div class="panel">
<h3>Daily Summary (1 Date = 1 Row)</h3>
<div class="scroll">
<table>
<thead>
<tr>
<th>Date</th>
<th>Spend</th>
<th>Impressions</th>
<th>Clicks</th>
<th>CTR</th>
<th>Units</th>
<th>Revenue</th>
<th>ROI</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>
</div>
</div>

</div>

<script>
const URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTGOsj66mo-CpS5eTerQgEcjYvr5GuOkQUIQ_9Sy4bwFu6FjGv9wBvCZn5UQBcFB7M-dcuJdbxMxSnj/pub?gid=1175680150&single=true&output=csv";

const monthNames=[
"January","February","March","April","May","June",
"July","August","September","October","November","December"
];

init();

function init(){
const m=document.getElementById("month");
m.innerHTML=monthNames.map((x,i)=>
`<option value="${i+1}">${x}</option>`
).join("");
m.value=new Date().getMonth()+1;
loadData();
}

async function loadData(){

const csv=await fetch(URL).then(r=>r.text());

const rows=parse(csv);

const month=document.getElementById("month").value;

const filtered=rows.filter(r=>Number(r.month)==Number(month));

const daily=groupDaily(filtered);

renderKpis(daily);
renderTrend(daily);
renderTable(daily);
}

function parse(text){

const lines=text.trim().split("\n");
const heads=lines[0].split(",");

return lines.slice(1).map(line=>{
const vals=line.split(",");
const obj={};
heads.forEach((h,i)=>obj[h.trim()]=(vals[i]||"").trim());
return obj;
});
}

function groupDaily(rows){

const map={};

rows.forEach(r=>{

const d=r.date;

if(!map[d]){
map[d]={
date:d,
spend:0,
imp:0,
clicks:0,
units:0,
rev:0
};
}

map[d].spend+=num(r.ad_spend);
map[d].imp+=num(r.impressions);
map[d].clicks+=num(r.clicks);
map[d].units+=num(r.units_sold_total);
map[d].rev+=num(r.total_revenue);

});

return Object.values(map).sort((a,b)=>a.date.localeCompare(b.date));
}

function renderKpis(rows){

let spend=0,imp=0,clicks=0,units=0,rev=0;

rows.forEach(r=>{
spend+=r.spend;
imp+=r.imp;
clicks+=r.clicks;
units+=r.units;
rev+=r.rev;
});

const roi=spend?rev/spend:0;

const data=[
["Spend",money(spend)],
["Impressions",fmt(imp)],
["Clicks",fmt(clicks)],
["Units",fmt(units)],
["Revenue",money(rev)],
["ROI",roi.toFixed(2)]
];

document.getElementById("kpis").innerHTML=data.map(x=>`
<div class="card">
<div class="label">${x[0]}</div>
<div class="value">${x[1]}</div>
</div>
`).join("");
}

function renderTrend(rows){

const max=Math.max(...rows.map(x=>x.rev),1);

document.getElementById("trend").innerHTML=
rows.slice(-10).map(r=>`
<div style="margin-bottom:12px">
<div class="small">${r.date} | Spend ${money(r.spend)} | Revenue ${money(r.rev)}</div>
<div class="bar">
<div class="fill" style="width:${(r.rev/max)*100}%"></div>
</div>
</div>
`).join("");
}

function renderTable(rows){

document.getElementById("rows").innerHTML=
rows.map(r=>`
<tr>
<td>${r.date}</td>
<td>${money(r.spend)}</td>
<td>${fmt(r.imp)}</td>
<td>${fmt(r.clicks)}</td>
<td>${pct(r.clicks,r.imp)}</td>
<td>${fmt(r.units)}</td>
<td>${money(r.rev)}</td>
<td>${ratio(r.rev,r.spend)}</td>
</tr>
`).join("");
}

function num(v){
return Number(String(v||0).replace(/,/g,""))||0;
}
function money(v){
return "₹"+Number(v).toLocaleString("en-IN",{maximumFractionDigits:0});
}
function fmt(v){
return Number(v).toLocaleString("en-IN");
}
function pct(a,b){
return b?((a/b)*100).toFixed(2)+"%":"0.00%";
}
function ratio(a,b){
return b?(a/b).toFixed(2):"0.00";
}
</script>

</body>
</html>
