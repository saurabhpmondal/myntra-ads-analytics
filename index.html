<!-- FILE: index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Myntra Ads Analytics</title>

  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/variables.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/header.css" />
  <link rel="stylesheet" href="./css/filters.css" />
  <link rel="stylesheet" href="./css/tabs.css" />
  <link rel="stylesheet" href="./css/cards.css" />
  <link rel="stylesheet" href="./css/loaders.css" />
</head>

<body>
  <div id="app">

    <!-- HEADER -->
    <header class="app-header">
      <div class="brand-wrap">
        <div class="brand-logo">M</div>
        <div>
          <h1 class="brand-title">Myntra Ads Analytics</h1>
          <p class="brand-subtitle">Performance Control Center</p>
        </div>
      </div>

      <div class="header-actions">
        <button class="ghost-btn" id="refreshBtn">Refresh</button>
        <button class="primary-btn" id="consoleToggleBtn">Console</button>
      </div>
    </header>

    <!-- FILTER BAR -->
    <section class="filter-bar">
      <div class="filter-item">
        <label>Year</label>
        <select id="yearFilter">
          <option>2026</option>
        </select>
      </div>

      <div class="filter-item">
        <label>Month</label>
        <select id="monthFilter">
          <option>April</option>
        </select>
      </div>

      <div class="filter-item">
        <label>Date Range</label>
        <input type="date" />
      </div>

      <div class="filter-item">
        <label>&nbsp;</label>
        <input type="date" />
      </div>

      <div class="filter-actions">
        <button class="primary-btn">Apply</button>
      </div>
    </section>

    <!-- TABS -->
    <nav class="tabs-wrap">
      <button class="tab active">Dashboard</button>
      <button class="tab">Campaign</button>
      <button class="tab">Adgroup</button>
      <button class="tab">Style</button>
      <button class="tab">Analysis</button>
      <button class="tab">Export Center</button>
    </nav>

    <!-- PAGE -->
    <main class="page-wrap">

      <!-- KPI CARDS -->
      <section class="cards-grid">
        <div class="kpi-card">
          <span class="kpi-label">Spend</span>
          <strong class="kpi-value">₹0</strong>
        </div>

        <div class="kpi-card">
          <span class="kpi-label">Revenue</span>
          <strong class="kpi-value">₹0</strong>
        </div>

        <div class="kpi-card">
          <span class="kpi-label">ROI</span>
          <strong class="kpi-value">0.00</strong>
        </div>

        <div class="kpi-card">
          <span class="kpi-label">Clicks</span>
          <strong class="kpi-value">0</strong>
        </div>

        <div class="kpi-card">
          <span class="kpi-label">Units</span>
          <strong class="kpi-value">0</strong>
        </div>

        <div class="kpi-card">
          <span class="kpi-label">Impressions</span>
          <strong class="kpi-value">0</strong>
        </div>
      </section>

      <!-- CHART PLACEHOLDER -->
      <section class="panel-card">
        <div class="panel-head">
          <h3>Spend vs Revenue Trend</h3>
        </div>
        <div class="chart-placeholder shimmer"></div>
      </section>

      <!-- TABLE PLACEHOLDER -->
      <section class="panel-card">
        <div class="panel-head">
          <h3>Performance Summary</h3>
        </div>
        <div class="table-placeholder shimmer"></div>
      </section>

    </main>

    <!-- DEV CONSOLE -->
    <aside class="dev-console hidden" id="devConsole">
      <div class="console-head">
        <span>Developer Console</span>
        <button id="closeConsole">✕</button>
      </div>

      <div class="console-body">
        <div>[INFO] App initialized.</div>
        <div>[INFO] Waiting for data loader...</div>
      </div>
    </aside>

  </div>
</body>
</html>
