<!-- FILE: index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Myntra Ads Analytics</title>

<link rel="stylesheet" href="./css/layout.css" />
<link rel="stylesheet" href="./css/components.css" />
</head>

<body>

<!-- TOP LOADER -->
<div class="top-loader" id="topLoader">
  <div class="top-loader-bar" id="topLoaderBar"></div>
</div>

<!-- APP -->
<div class="app-shell">

  <!-- HEADER -->
  <header class="header">
    <div class="brand">
      <div class="brand-icon">M</div>

      <div>
        <h1>Myntra Ads Analytics</h1>
        <p>Stable V1 Control Center</p>
      </div>
    </div>

    <div class="header-actions">
      <button class="btn ghost" id="refreshBtn">Refresh</button>
    </div>
  </header>

  <!-- FILTER BAR -->
  <section class="filters">

    <div class="field">
      <label>Year</label>
      <select id="yearFilter"></select>
    </div>

    <div class="field">
      <label>Month</label>
      <select id="monthFilter"></select>
    </div>

    <div class="field">
      <label>Day From</label>
      <select id="dayFromFilter"></select>
    </div>

    <div class="field">
      <label>Day To</label>
      <select id="dayToFilter"></select>
    </div>

    <div class="field action">
      <button class="btn primary" id="applyBtn">Apply</button>
    </div>

  </section>

  <!-- TABS -->
  <nav class="tabs">

    <button class="tab active">Dashboard</button>
    <button class="tab">Campaign</button>
    <button class="tab">Adgroup</button>
    <button class="tab">Style</button>
    <button class="tab">Analysis</button>
    <button class="tab">Export Center</button>

  </nav>

  <!-- CONTENT -->
  <main class="content" id="contentArea">

    <section class="welcome-card">
      <div class="spinner"></div>
      <h2 id="statusText">Initializing Application...</h2>
      <p>Please wait while stable shell loads.</p>
    </section>

  </main>

</div>

<script type="module" src="./js/core/app.js?v=1"></script>

</body>
</html>
